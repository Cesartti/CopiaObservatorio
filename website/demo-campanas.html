<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Estrategias – Componente Mujer</title>

  <!-- Iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- (Opcional) tu CSS general -->
  <link rel="stylesheet" href="assets/css/style.css" />

  <style>
    :root{
      --brand:#6d28d9; --brand-strong:#5b21b6;
      --ink:#111827; --paper:#ffffff; --bg:#f8fafc;
      --radius:16px; --shadow:0 6px 24px rgba(0,0,0,.08);
      --btn-bg:#ffffff; --btn-ink:#111827;
      --slide-h: 76vh;   /* altura objetivo escritorio */
      --slide-h-max: 820px;
    }
    body{ background:var(--bg); font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; color:var(--ink); }
    header.hero{ padding:40px 16px 16px; text-align:center; }
    header.hero .hero-content h1{ font-weight:800; font-size:clamp(1.05rem, 1rem + 1.2vw, 1.8rem); margin:0; color:#1f2937; }

    main#app{ width:min(1100px,92%); margin:18px auto 40px; position:relative; }

    /* Slider */
    .slider{ position:relative; overflow:hidden; border-radius:var(--radius); box-shadow:var(--shadow); }
    .slider-track{ display:flex; will-change:transform; transition:transform .45s ease; }
    .slide{
      flex:0 0 100%;
      display:grid; gap:16px; align-items:stretch;
      grid-template-columns:minmax(0,1.2fr) minmax(0,1fr);
      height: min(var(--slide-h), var(--slide-h-max));
    }
    .slide--purple{ background:var(--brand); color:#fff; }
    .slide--white{ background:var(--paper); color:var(--ink); border:1px solid rgba(0,0,0,.06); }

    .slide-media, .slide-body{ height:100%; }
    .slide-media{ position:relative; overflow:hidden; }
    .slide-media img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:center; }

    .slide-body{ padding:18px; display:flex; flex-direction:column; gap:8px; overflow:auto; -webkit-overflow-scrolling:touch; }
    .slide-title{ font-weight:800; font-size:clamp(1rem, .9rem + 1vw, 1.4rem); margin:0; }
    .slide-html{ line-height:1.6; font-size:clamp(.95rem, .9rem + .3vw, 1rem); }
    .slide-html p{ margin:.45rem 0; }
    .slide-credit{ opacity:.9; font-size:.95rem; margin-top:auto; }
    .slide--purple .slide-title, .slide--purple .slide-html, .slide--purple .slide-credit{ color:#fff; }
    .slide--white .slide-title{ color:#111827; }

    /* Flechas */
    .nav-btn{
      position:absolute; top:50%; transform:translateY(-50%);
      width:40px; height:40px; border-radius:50%;
      display:grid; place-items:center; border:1px solid rgba(0,0,0,.15);
      background:var(--btn-bg); color:var(--btn-ink);
      box-shadow:0 6px 20px rgba(0,0,0,.15);
      cursor:pointer; z-index:5;
    }
    .nav-prev{ left:8px; } .nav-next{ right:8px; }
    .nav-btn[disabled]{ opacity:.5; pointer-events:none; }

    /* Dots */
    .slider-dots{
      position:absolute; left:50%; transform:translateX(-50%);
      bottom:8px; display:flex; gap:8px; z-index:4;
      background:rgba(255,255,255,.85); padding:6px 10px; border-radius:999px; border:1px solid rgba(0,0,0,.08);
    }
    .slider-dot{ width:8px; height:8px; border-radius:999px; background:#9ca3af; border:none; cursor:pointer; }
    .slider-dot.is-active{ background:#4c1d95; }

    /* Móvil */
    @media (max-width: 900px){
      :root{ --slide-h: auto; }
      .slide{ grid-template-columns:1fr; height:auto; }
      .slide-media{ height: 38vh; }
      .slide-body{ max-height: 48vh; padding:14px; }
      .nav-btn{ width:36px; height:36px; }
      .slider-dots{ bottom:6px; }
    }
    @supports not (height: 1vh){
      .slide{ height:auto; }
      .slide-media{ height: 320px; }
      .slide-body{ max-height: 420px; }
    }
    @media (prefers-reduced-motion: reduce){
      .slider-track{ transition:none; }
    }
  </style>
</head>
<body>

  <main id="app">
    <div class="hero-content">
      <h1>Estrategias – Componente Mujer</h1>
    </div>
    <div class="slider" id="slider" role="region" aria-roledescription="carrusel" aria-label="Estrategias – Componente Mujer">
      <div class="slider-track" id="sliderTrack" aria-live="polite"></div>

      <button class="nav-btn nav-prev" id="btnPrev" aria-label="Anterior">
        <i class="fa-solid fa-chevron-left"></i>
      </button>
      <button class="nav-btn nav-next" id="btnNext" aria-label="Siguiente">
        <i class="fa-solid fa-chevron-right"></i>
      </button>

      <div class="slider-dots" id="sliderDots" aria-label="Páginas"></div>
    </div>
  </main>

  <script src="assets/js/script_scroll3.js"></script>
</body>
</html>

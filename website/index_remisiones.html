
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Mapa de Atención Integral y Remisiones</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; }
    #map { width: 100%; height: 100vh; }
    h2 { text-align: center; margin-top: 10px; }
  </style>
</head>
<body>

<h2>Municipios con Atención Integral y Remisiones</h2>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
<script src="https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png"></script>
<script src="assets/js/boyaca_low.js"></script>
<script src="assets/js/remitentes.js"></script>

<script>
  const map = L.map('map').setView([5.55, -73.36], 8);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  const capaBoyaca = L.geoJson(boyacaData, {
    style: {
      color: "#666",
      weight: 1,
      fillColor: "#ddd",
      fillOpacity: 0.5
    },
    onEachFeature: function(feature, layer) {
      layer.bindTooltip(feature.properties.name, { permanent: false, direction: 'top' });
    }
  }).addTo(map);

  // Municipios con atención integral
  const municipiosAtencion = [
    { nombre: "Tunja", coords: [5.5353, -73.3678] },
    { nombre: "Duitama", coords: [5.8266, -73.0244] },
    { nombre: "Sogamoso", coords: [5.7148, -72.9339] },
    { nombre: "Chiquinquirá", coords: [5.6167, -73.8167] },
    { nombre: "Paipa", coords: [5.7774, -73.1173] },
    { nombre: "Soatá", coords: [6.3247, -72.6921] },
    { nombre: "Guateque", coords: [5.0064, -73.4736] }
  ];

  municipiosAtencion.forEach(muni => {
    L.circleMarker(muni.coords, {
      radius: 8,
      fillColor: "#007bff",
      color: "#0055a5",
      weight: 1,
      opacity: 1,
      fillOpacity: 0.9
    }).addTo(map)
      .bindPopup(`<strong>${muni.nombre}</strong><br>Atención Integral Disponible`);
  });

  // Municipios remitentes resaltados
  municipiosRemitentes.forEach(muni => {
    L.circleMarker(muni.coords, {
      radius: 10,
      fillColor: "#ff8800",
      color: "#cc6600",
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map)
      .bindPopup(`<strong>${muni.nombre}</strong><br>Remisiones: ${muni.remisiones}`);
  });
</script>

</body>
</html>
